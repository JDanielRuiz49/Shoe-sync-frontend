<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calzados Dashboard — Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <div id="toast-container"></div>

    <div class="login-page">
        <div class="login-bg"></div>
        <div class="login-grid"></div>

        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">
                    <i class="bi bi-layer-forward"></i>
                </div>
                <div>
                    <h1>Calzados</h1>
                    <span>DASHBOARD MANAGEMENT</span>
                </div>
            </div>

            <div class="login-tabs">
                <button type="button" class="login-tab active" id="tab-login">INGRESAR</button>
                <button type="button" class="login-tab" id="tab-registro">REGISTRARSE</button>
            </div>

            <div class="form-panel active" id="panel-login">
                <form id="form-login">
                    <div class="form-group">
                        <label class="form-label" for="login-user">Usuario</label>
                        <input type="text" id="login-user" class="form-control" placeholder="Ej: admin" autocomplete="username">
                    </div>
                    <div class="form-group" style="margin-bottom: 24px;">
                        <label class="form-label" for="login-pass">Contraseña</label>
                        <input type="password" id="login-pass" class="form-control" placeholder="••••••••" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" id="btn-login">Ingresar</button>
                </form>
            </div>

            <div class="form-panel" id="panel-registro">
                <form id="form-registro">
                    <div class="form-group">
                        <label class="form-label" for="reg-usuario">Nombre de Usuario *</label>
                        <input type="text" id="reg-usuario" class="form-control" placeholder="Ej: juan_calzados">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="reg-correo">Correo Electrónico *</label>
                        <input type="email" id="reg-correo" class="form-control" placeholder="juan@ejemplo.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="reg-pass">Contraseña *</label>
                        <input type="password" id="reg-pass" class="form-control" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                    </div>
                    <div class="form-group" style="margin-bottom: 28px;">
                        <label class="form-label" for="reg-pass2">Confirmar Contraseña *</label>
                        <input type="password" id="reg-pass2" class="form-control" placeholder="Repite tu contraseña" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" id="btn-registro">Crear cuenta</button>
                </form>
            </div>

        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Inicializar los listeners de la página de Login al cargar el DOM
        document.addEventListener('DOMContentLoaded', initLoginPage);
    </script>
</body>
</html>
